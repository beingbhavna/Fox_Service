<header class="top-header" [class.sticky]="isSticky">
  <div class="container nav">
    <a routerLink="/" class="logo" (click)="goToHome()">
      <img src="/assets/images/logo.png" />
    </a>
    <div class="top-bar">
      <div class="top-left">
        <a class="register-link">Register as a Professional</a>
      </div>
      <div class="top-right">
        <span class="phone">(888) 999-83-82 </span>
        <a class="login-btn" (click)="openLoginModal()"> Login / Sign Up</a>
      </div>
    <div class="cart" routerLink="/cart">
      🛒 <span class="badge">{{cartCount}}</span>
    </div>
    </div>
  </div>
</header>
<div class="register-wrapper">
  <div class="mobile-menu-icon" (click)="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- Animated Menu -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <a routerLink="/register-as-a-professional">Register as a Professional</a>
    <a routerLink="/login">Login / Sign Up</a>
  </div>

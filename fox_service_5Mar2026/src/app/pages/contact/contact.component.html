<section class="page-hero">
  <h1>Contact Us</h1>
</section>

<section class="contact container">
  <div class="contact-grid">

    <div class="info">
      <h2>Get in Touch</h2>
      <p>📍 Noida, India</p>
      <p>📞 +91 9876543210</p>
      <p>✉ support&#64;foxservice.in</p>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm">
      <input type="text" placeholder="Your Name" [(ngModel)]="contact.name" name="name" required>
      <input type="email" placeholder="Your Email" [(ngModel)]="contact.email" name="email" required>
      <textarea placeholder="Message" [(ngModel)]="contact.message" name="message"></textarea>
      <button class="btn">Send Message</button>
    </form>

  </div>
</section>

<section class="page-hero">
  <h1>Your Cart</h1>
</section>

<section class="cart container" *ngIf="(cart$ | async) as items">
  <div *ngIf="items.length; else empty">

    <div class="cart-item" *ngFor="let it of items">
      <div>
        <h3>{{ it.title }}</h3>
        <p>₹{{ it.price }}</p>
      </div>

      <input type="number" min="1"
        [value]="it.quantity"
        (change)="updateQuantity(it.id, $any($event.target).value)" />

      <strong>₹{{ (it.price || 0) * (it.quantity || 1) }}</strong>

      <button (click)="remove(it.id)">Remove</button>
    </div>

    <div class="checkout">
      <button class="btn" (click)="clear()">Clear Cart</button>
      <button class="btn primary">Checkout</button>
    </div>

  </div>

  <ng-template #empty>
    <p>Your cart is empty.</p>
  </ng-template>
</section>

}

    position: relative;

    color: #000;
    font-size: 12px;

    display: block;
    font-weight: 500;
    text-transform: uppercase;

    -moz-transition: all 0.4s;
    -ms-transition: all 0.4s;
    -o-transition: all 0.4s;

    text-decoration: none;

.bt-menu-filter ul li.active a, .bt-menu-filter ul li:hover a {

@media (max-width: 490px){
.hide-in-mob {
    display: none !important;
}
.example-one-header, nav {
    font-size: 0;
}
.example-one-header {
    border-radius: 3px;
    display: block;
}
.example-one-header {
    background: #eaeaea;
}
.scroll {
    white-space: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    -ms-overflow-style: -ms-autohiding-scrollbar;
}
.nav-item, .vertical-align-middle {
    display: inline-block;
    vertical-align: middle;
}
.nav-item.active {
    color: #ff5722;
    font-weight: bold;
}
.nav-item {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 13px;
    color: #000000;
    line-height: 30px;
    text-align: center;
    font-family: 'Nunito',sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: bold;
}
